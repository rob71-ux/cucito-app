<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#f5f0e8" rx="12"/>
  <!-- Piedino universale - vista frontale -->
  <!-- shank (attacco) -->
  <rect x="82" y="10" width="36" height="30" rx="4" fill="#888" stroke="#555" stroke-width="1.5"/>
  <rect x="88" y="38" width="24" height="12" rx="2" fill="#777" stroke="#555" stroke-width="1"/>
  <!-- screw -->
  <circle cx="100" cy="20" r="5" fill="#aaa" stroke="#666" stroke-width="1"/>
  <line x1="100" y1="17" x2="100" y2="23" stroke="#666" stroke-width="1.5"/>
  <!-- main body of foot -->
  <path d="M 60,50 L 140,50 L 148,80 Q 150,120 148,150 L 52,150 Q 50,120 52,80 Z"
        fill="#c0c0c0" stroke="#888" stroke-width="2"/>
  <!-- needle slot -->
  <ellipse cx="100" cy="100" rx="6" ry="8" fill="#555" opacity="0.6"/>
  <!-- toe of foot -->
  <path d="M 52,150 Q 50,170 55,180 L 145,180 Q 150,170 148,150 Z"
        fill="#b0b0b0" stroke="#888" stroke-width="2"/>
  <!-- flat bottom surface -->
  <rect x="55" y="178" width="90" height="6" rx="3" fill="#999" stroke="#777" stroke-width="1"/>
  <!-- label -->
  <text x="100" y="198" font-size="11" fill="#5C7A4E" font-family="sans-serif" text-anchor="middle" font-weight="700">P01 · Universale</text>
</svg>
