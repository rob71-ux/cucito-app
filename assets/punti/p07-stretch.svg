<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 100" width="240" height="100">
  <rect width="240" height="100" fill="#faf7f2" rx="8"/>
  <line x1="10" y1="42" x2="230" y2="42" stroke="#e8ddd0" stroke-width="1.5"/>
  <line x1="10" y1="58" x2="230" y2="58" stroke="#e8ddd0" stroke-width="1.5"/>
  <!-- stretch stitch: forward 2, back 1, forward 2 pattern -->
  <!-- shown as overlapping segments -->
  <g fill="none" stroke="#C47A5A" stroke-width="2.5" stroke-linecap="round">
    <!-- segment 1 -->
    <line x1="20" y1="50" x2="36" y2="50"/>
    <line x1="36" y1="50" x2="28" y2="50"/>
    <line x1="28" y1="50" x2="44" y2="50"/>
    <!-- segment 2 -->
    <line x1="44" y1="50" x2="60" y2="50"/>
    <line x1="60" y1="50" x2="52" y2="50"/>
    <line x1="52" y1="50" x2="68" y2="50"/>
    <!-- segment 3 -->
    <line x1="68" y1="50" x2="84" y2="50"/>
    <line x1="84" y1="50" x2="76" y2="50"/>
    <line x1="76" y1="50" x2="92" y2="50"/>
    <!-- segment 4 -->
    <line x1="92" y1="50" x2="108" y2="50"/>
    <line x1="108" y1="50" x2="100" y2="50"/>
    <line x1="100" y1="50" x2="116" y2="50"/>
    <!-- segment 5 -->
    <line x1="116" y1="50" x2="132" y2="50"/>
    <line x1="132" y1="50" x2="124" y2="50"/>
    <line x1="124" y1="50" x2="140" y2="50"/>
    <!-- segment 6 -->
    <line x1="140" y1="50" x2="156" y2="50"/>
    <line x1="156" y1="50" x2="148" y2="50"/>
    <line x1="148" y1="50" x2="164" y2="50"/>
    <!-- segment 7 -->
    <line x1="164" y1="50" x2="180" y2="50"/>
    <line x1="180" y1="50" x2="172" y2="50"/>
    <line x1="172" y1="50" x2="188" y2="50"/>
  </g>
  <!-- key dots -->
  <circle cx="20"  cy="50" r="3" fill="#C47A5A"/>
  <circle cx="44"  cy="50" r="3" fill="#C47A5A"/>
  <circle cx="68"  cy="50" r="3" fill="#C47A5A"/>
  <circle cx="92"  cy="50" r="3" fill="#C47A5A"/>
  <circle cx="116" cy="50" r="3" fill="#C47A5A"/>
  <circle cx="140" cy="50" r="3" fill="#C47A5A"/>
  <circle cx="164" cy="50" r="3" fill="#C47A5A"/>
  <circle cx="188" cy="50" r="3" fill="#C47A5A"/>
  <!-- label -->
  <text x="15" y="82" font-size="9.5" fill="#7A6050" font-family="sans-serif">avanti → indietro → avanti (elastico)</text>
</svg>
