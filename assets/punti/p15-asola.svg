<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 100" width="240" height="100">
  <rect width="240" height="100" fill="#faf7f2" rx="8"/>
  <!-- fabric background -->
  <rect x="30" y="20" width="180" height="60" rx="4" fill="#f0ebe0" stroke="#ddd0be" stroke-width="1"/>
  <!-- buttonhole shape -->
  <!-- left column satin -->
  <g stroke="#5C7A4E" stroke-width="2.5" fill="none">
    <!-- left satin column -->
    <rect x="65" y="28" width="8" height="44" fill="#5C7A4E" rx="1" opacity="0.85"/>
    <!-- right satin column -->
    <rect x="167" y="28" width="8" height="44" fill="#5C7A4E" rx="1" opacity="0.85"/>
    <!-- top bar tack -->
    <rect x="63" y="27" width="114" height="7" fill="#3d6b32" rx="1"/>
    <!-- bottom bar tack -->
    <rect x="63" y="66" width="114" height="7" fill="#3d6b32" rx="1"/>
  </g>
  <!-- slit / opening -->
  <line x1="120" y1="32" x2="120" y2="68" stroke="#c47a5a" stroke-width="2" stroke-dasharray="3,2"/>
  <!-- labels -->
  <text x="88" y="92" font-size="10" fill="#7A6050" font-family="sans-serif" text-anchor="middle">Asola 4 passaggi</text>
  <text x="88" y="103" font-size="9" fill="#7A6050" font-family="sans-serif" text-anchor="middle">Singer 4432</text>
  <!-- arrows showing 4 passes -->
  <text x="150" y="40" font-size="8" fill="#5C7A4E" font-family="sans-serif">①②</text>
  <text x="150" y="65" font-size="8" fill="#3d6b32" font-family="sans-serif">③④</text>
</svg>
