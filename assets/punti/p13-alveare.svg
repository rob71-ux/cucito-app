<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 100" width="240" height="100">
  <rect width="240" height="100" fill="#faf7f2" rx="8"/>
  <!-- honeycomb / smocking pattern -->
  <g stroke="#C9A227" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- row 1 diamonds -->
    <polyline points="20,50 35,35 50,50 35,65 20,50"/>
    <polyline points="50,50 65,35 80,50 65,65 50,50"/>
    <polyline points="80,50 95,35 110,50 95,65 80,50"/>
    <polyline points="110,50 125,35 140,50 125,65 110,50"/>
    <polyline points="140,50 155,35 170,50 155,65 140,50"/>
    <polyline points="170,50 185,35 200,50 185,65 170,50"/>
    <polyline points="200,50 215,35 230,50 215,65 200,50"/>
    <!-- connecting horizontals -->
    <line x1="20" y1="50" x2="230" y2="50" stroke="#C9A227" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
    <!-- gather dots -->
    <circle cx="20"  cy="50" r="3" fill="#C9A227"/>
    <circle cx="50"  cy="50" r="3" fill="#C9A227"/>
    <circle cx="80"  cy="50" r="3" fill="#C9A227"/>
    <circle cx="110" cy="50" r="3" fill="#C9A227"/>
    <circle cx="140" cy="50" r="3" fill="#C9A227"/>
    <circle cx="170" cy="50" r="3" fill="#C9A227"/>
    <circle cx="200" cy="50" r="3" fill="#C9A227"/>
    <circle cx="230" cy="50" r="3" fill="#C9A227"/>
  </g>
</svg>
