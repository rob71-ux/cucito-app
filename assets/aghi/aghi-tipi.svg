<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">
  <rect width="520" height="180" fill="#faf7f2" rx="12"/>
  <text x="260" y="22" font-size="13" fill="#271A0E" font-family="sans-serif" text-anchor="middle" font-weight="700">Tipi di ago per macchina — Confronto punte</text>

  <!-- UNIVERSALE -->
  <g transform="translate(30,30)">
    <line x1="20" y1="0" x2="20" y2="90" stroke="#888" stroke-width="8" stroke-linecap="round"/>
    <line x1="20" y1="70" x2="20" y2="120" stroke="#aaa" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="20" cy="75" rx="3" ry="4" fill="#444"/>
    <!-- slightly rounded tip -->
    <path d="M17,118 Q20,130 23,118" fill="#888" stroke="#666" stroke-width="1"/>
    <text x="20" y="145" font-size="9.5" fill="#5C7A4E" font-family="sans-serif" text-anchor="middle" font-weight="700">Universale</text>
    <text x="20" y="156" font-size="8.5" fill="#7A6050" font-family="sans-serif" text-anchor="middle">punta arrotondata</text>
  </g>

  <!-- JERSEY/STRETCH -->
  <g transform="translate(100,30)">
    <line x1="20" y1="0" x2="20" y2="90" stroke="#888" stroke-width="8" stroke-linecap="round"/>
    <line x1="20" y1="70" x2="20" y2="120" stroke="#aaa" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="20" cy="75" rx="3" ry="4" fill="#444"/>
    <!-- ball tip -->
    <circle cx="20" cy="128" r="4.5" fill="#C9A227" stroke="#a07b15" stroke-width="1.5"/>
    <text x="20" y="145" font-size="9.5" fill="#C9A227" font-family="sans-serif" text-anchor="middle" font-weight="700">Jersey</text>
    <text x="20" y="156" font-size="8.5" fill="#7A6050" font-family="sans-serif" text-anchor="middle">punta a sfera</text>
  </g>

  <!-- JEANS/DENIM -->
  <g transform="translate(170,30)">
    <line x1="20" y1="0" x2="20" y2="90" stroke="#4A6B9A" stroke-width="9" stroke-linecap="round"/>
    <line x1="20" y1="70" x2="20" y2="120" stroke="#6A8BAA" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="20" cy="75" rx="3.5" ry="4" fill="#333"/>
    <!-- sharp tapered tip -->
    <path d="M17,118 L20,133 L23,118" fill="#4A6B9A" stroke="#3a5080" stroke-width="1"/>
    <text x="20" y="145" font-size="9.5" fill="#4A6B9A" font-family="sans-serif" text-anchor="middle" font-weight="700">Jeans</text>
    <text x="20" y="156" font-size="8.5" fill="#7A6050" font-family="sans-serif" text-anchor="middle">punta affilata</text>
  </g>

  <!-- MICROTEX -->
  <g transform="translate(240,30)">
    <line x1="20" y1="0" x2="20" y2="90" stroke="#888" stroke-width="7" stroke-linecap="round"/>
    <line x1="20" y1="70" x2="20" y2="122" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="20" cy="74" rx="2.5" ry="3.5" fill="#444"/>
    <!-- extra fine sharp tip -->
    <path d="M18.5,120 L20,138 L21.5,120" fill="#7A4E7A" stroke="#5a3a5a" stroke-width="1"/>
    <text x="20" y="148" font-size="9.5" fill="#7A4E7A" font-family="sans-serif" text-anchor="middle" font-weight="700">Microtex</text>
    <text x="20" y="159" font-size="8.5" fill="#7A6050" font-family="sans-serif" text-anchor="middle">punta finissima</text>
  </g>

  <!-- PELLE -->
  <g transform="translate(310,30)">
    <line x1="20" y1="0" x2="20" y2="90" stroke="#888" stroke-width="8" stroke-linecap="round"/>
    <line x1="20" y1="70" x2="20" y2="118" stroke="#C47A5A" stroke-width="4.5" stroke-linecap="round"/>
    <ellipse cx="20" cy="75" rx="3" ry="4" fill="#444"/>
    <!-- cutting tip (triangular) -->
    <path d="M15,116 L20,132 L25,116 Z" fill="#C47A5A" stroke="#a05a3a" stroke-width="1.5"/>
    <text x="20" y="147" font-size="9.5" fill="#C47A5A" font-family="sans-serif" text-anchor="middle" font-weight="700">Pelle</text>
    <text x="20" y="158" font-size="8.5" fill="#7A6050" font-family="sans-serif" text-anchor="middle">punta cuneiforme</text>
  </g>

  <!-- GEMELLO -->
  <g transform="translate(380,30)">
    <!-- twin needle: two needles on one shaft -->
    <line x1="20" y1="0" x2="20" y2="70" stroke="#888" stroke-width="10" stroke-linecap="round"/>
    <!-- cross bar -->
    <line x1="12" y1="72" x2="28" y2="72" stroke="#888" stroke-width="4"/>
    <!-- left needle -->
    <line x1="13" y1="70" x2="13" y2="118" stroke="#aaa" stroke-width="3.5" stroke-linecap="round"/>
    <ellipse cx="13" cy="76" rx="2.5" ry="3" fill="#444"/>
    <path d="M11,116 L13,128 L15,116" fill="#888" stroke="#666" stroke-width="1"/>
    <!-- right needle -->
    <line x1="27" y1="70" x2="27" y2="118" stroke="#aaa" stroke-width="3.5" stroke-linecap="round"/>
    <ellipse cx="27" cy="76" rx="2.5" ry="3" fill="#444"/>
    <path d="M25,116 L27,128 L29,116" fill="#888" stroke="#666" stroke-width="1"/>
    <text x="20" y="144" font-size="9.5" fill="#5C7A4E" font-family="sans-serif" text-anchor="middle" font-weight="700">Gemello</text>
    <text x="20" y="155" font-size="8.5" fill="#7A6050" font-family="sans-serif" text-anchor="middle">doppio ago</text>
  </g>

  <!-- RICAMO -->
  <g transform="translate(450,30)">
    <line x1="20" y1="0" x2="20" y2="90" stroke="#C47A5A" stroke-width="8" stroke-linecap="round"/>
    <line x1="20" y1="70" x2="20" y2="118" stroke="#d49a7a" stroke-width="4" stroke-linecap="round"/>
    <!-- large eye -->
    <ellipse cx="20" cy="100" rx="5" ry="7" fill="none" stroke="#C47A5A" stroke-width="2"/>
    <path d="M17,116 L20,130 L23,116" fill="#C47A5A" stroke="#a05a3a" stroke-width="1"/>
    <text x="20" y="145" font-size="9.5" fill="#C47A5A" font-family="sans-serif" text-anchor="middle" font-weight="700">Ricamo</text>
    <text x="20" y="156" font-size="8.5" fill="#7A6050" font-family="sans-serif" text-anchor="middle">cruna larga</text>
  </g>
</svg>
